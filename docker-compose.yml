services:
  postgres:
    image: postgres:15
    container_name: stock_hawk_pg
    environment:
      POSTGRES_DB: ${PG_DB:-stock_hawk}
      POSTGRES_USER: ${PG_USER:-stock_hawk}
      POSTGRES_PASSWORD: ${PG_PASSWORD:-stock_hawk_dev}
    ports:
      - "5432:5432"
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PG_USER:-stock_hawk}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  neo4j:
    image: neo4j:5-community
    container_name: stock_hawk_neo4j
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD:-stock_hawk_dev}
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - ./data/neo4j:/data
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "neo4j", "-p", "${NEO4J_PASSWORD:-stock_hawk_dev}", "RETURN 1"]
      interval: 10s
      timeout: 10s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: stock_hawk_redis
    ports:
      - "6379:6379"
    volumes:
      - ./data/redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
